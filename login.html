<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mundo das Camisas - Login</title>
    <!-- CSS do Bootstrap -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<!-- Menu superior -->
<nav class="navbar navbar-expand-md navbar-dark fixed-top" style="background-color: #040273">
    <div class="container-fluid">
        <img alt="Logo" class="img-fluid ms-3" height="50" src="img/logo.png" width="50">
        <a class="navbar-brand p-3" href="index.html">Mundo das Camisas</a>
        <!-- Menu hambúrguer -->
        <button aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation"
                class="navbar-toggler"
                data-bs-target="#navbarCollapse" data-bs-toggle="collapse" type="button"><span
                class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item"><a class="nav-link active" href="index.html">Início</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle active" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Categorias
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="#" onclick="filtrarCategoria('todas')">Todas as Camisas</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="filtrarCategoria('nacionais')">Times Nacionais</a></li>
                        <li><a class="dropdown-item" href="#" onclick="filtrarCategoria('internacionais')">Times Internacionais</a></li>
                        <li><a class="dropdown-item" href="#" onclick="filtrarCategoria('selecao-brasileira')">Seleção Brasileira</a></li>
                        <li><a class="dropdown-item" href="#" onclick="filtrarCategoria('outras-selecoes')">Outras Seleções</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a class="nav-link active" href="cadastro.html">Cadastro</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
            </ul>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(1)">A+</button>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(-1)">A-</button>
            <button class="btn btn-sm btn-outline-warning" onclick="toggleContraste()">🌗 Contraste</button>
            <span class="me-3 fw-bold text-white ps-3" id="nomeUsuarioLogado"></span>
            <button class="btn btn-sm btn-danger botaoSair" onclick="fazerLogout()">Sair</button>
        </div>
    </div>
</nav>
<div style="height: 80px;"></div>
<main class="d-flex align-items-center justify-content-center w-100" style="min-height: calc(100vh - 80px);">
    <div class="form-signin p-4" style="width: 100%; max-width: 400px;">
        <form id="formLogin">
            <div class="d-flex align-items-center justify-content-center mb-4">
                <h1 class="h3 mb-0 fw-normal">Faça o login</h1>
                <img alt="logotipo" class="ms-3" src="img/logo.png" width="80">
            </div>

            <div class="form-floating mb-3">
                <input class="form-control" id="loginAcesso" placeholder="Ex: neymar" required type="text">
                <label for="loginAcesso">Nome de usuário</label>
            </div>

            <div class="form-floating mb-3">
                <input class="form-control" id="senhaAcesso" placeholder="Senha" required type="password">
                <label for="senhaAcesso">Senha</label>
            </div>

            <div class="form-check text-start my-3">
                <input class="form-check-input" id="checkDefault" type="checkbox" value="remember-me">
                <label class="form-check-label" for="checkDefault">Lembre-se de mim</label>
            </div>

            <button class="btn btn-primary w-100 py-2" type="submit">Entrar</button>
            <p class="mt-3 text-center text-muted">© 2026 Mundo das Camisas</p>
        </form>
    </div>
</main>
<!-- Elemento para o Toast (Feedback sem usar alert) -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div aria-atomic="true" aria-live="assertive" class="toast align-items-center text-bg-danger border-0" id="meuToast"
         role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMensagem">
                Mensagem de erro aqui.
            </div>
            <button aria-label="Close" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    type="button"></button>
        </div>
    </div>
</div>
<script crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
