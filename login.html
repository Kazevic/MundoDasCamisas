<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mundo das Camisas - Login</title>
    <!-- CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary">
    <!-- Menu superior -->
    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Mundo das Camisas</a>
        <!-- Menu hambúrguer -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span> </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item"> <a class="nav-link active" href="index.html">Início</a> </li>
                <li class="nav-item"> <a class="nav-link active" href="cadastro.html">Cadastro</a> </li>
                <li class="nav-item"> <a class="nav-link active" href="login.html">Login</a> </li>
            </ul>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(1)">A+</button>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(-1)">A-</button>
            <button class="btn btn-sm btn-outline-warning" onclick="toggleContraste()">🌗 Contraste</button>
        </div>
    </div>
    </nav>
    <main class="form-signin w-auto m-auto p-5 mt-5">
        <form>
            <div class="d-flex align-items-center">
                <h1 class="h3 mb-1 fw-normal">Faça o login</h1>
                <img class="mb-2 ms-3" src="img/logo.png" alt="logotipo" width="100">
            </div>
            <div class="form-floating">
                <input type="email" class="form-control" id="floatingInput" placeholder="neymar">
                <label for="floatingInput">Nome de usuário</label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Senha">
                <label for="floatingPassword">Senha</label>
            </div>
            <div class="form-check text-start my-3">
                <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
                <label class="form-check-label" for="checkDefault">Lembre-se de mim</label>
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit">Entrar</button>
            <p class="mt-2">© 2026</p>
        </form>
    </main>
    <!-- Elemento para o Toast (Feedback sem usar alert) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="meuToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMensagem">
                    Mensagem de erro aqui.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/script.js"></script>
</body>
</html>
