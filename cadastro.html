<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo das Camisas - Cadastro</title>
    <!-- CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Menu superior -->
<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Mundo das Camisas</a>
        <!-- Menu hambúrguer -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span> </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item"> <a class="nav-link active" href="index.html">Início</a> </li>
                <li class="nav-item"> <a class="nav-link active" href="cadastro.html">Cadastro</a> </li>
                <li class="nav-item"> <a class="nav-link active" href="login.html">Login</a> </li>
            </ul>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(1)">A+</button>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(-1)">A-</button>
            <button class="btn btn-sm btn-outline-warning" onclick="toggleContraste()">🌗 Contraste</button>
        </div>
    </div>
</nav>
    <div class="container mt-5 pt-5">
        <h2 class="text-center mb-4">Crie sua Conta</h2>
        <form id="formCadastro" class="w-75 mx-auto">
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="Mínimo 15 letras">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Telefone Celular</label>
                    <input type="text" id="celular" class="form-control" placeholder="(+55)XX-XXXXXXXXX">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Nome de usuário</label>
                    <input type="text" id="login" class="form-control" placeholder="Exatamente 6 letras">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Exatamente 8 letras">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Confirmar Senha</label>
                    <input type="password" id="confirmaSenha" class="form-control">
                </div>
            </div>
            <div class="d-flex justify-content-center mt-2">
                <button type="submit" class="btn btn-success w-50">Cadastrar e Ir para Login</button>
            </div>
        </form>
    </div>

    <!-- Elemento para o Toast (Feedback sem usar alert!) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="meuToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMensagem">
                    Mensagem de erro aqui.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/script.js"></script>
</body>
</html>
