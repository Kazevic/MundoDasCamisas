<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mundo das Camisas - Cadastro</title>
    <!-- CSS do Bootstrap -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary">
<!-- Menu superior -->
<nav class="navbar navbar-expand-md navbar-dark fixed-top" style="background-color: #040273">
    <div class="container-fluid">
        <img src="img/logo.png" alt="Logo" class="img-fluid ms-3" width="50" height="50">
        <a class="navbar-brand p-3" href="index.html">Mundo das Camisas</a>
        <!-- Menu hambúrguer -->
        <button aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation"
                class="navbar-toggler"
                data-bs-target="#navbarCollapse" data-bs-toggle="collapse" type="button"><span
                class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item"><a class="nav-link active" href="index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link active" href="cadastro.html">Cadastro</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
            </ul>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(1)">A+</button>
            <button class="btn btn-sm btn-outline-light me-2" onclick="mudarFonte(-1)">A-</button>
            <button class="btn btn-sm btn-outline-warning" onclick="toggleContraste()">🌗 Contraste</button>
            <span id="nomeUsuarioLogado" class="me-3 fw-bold"></span>
            <button class="btn btn-sm btn-danger botaoSair" onclick="fazerLogout()">Sair</button>
        </div>
    </div>
</nav>
<div class="container mt-5 pt-5">
    <h2 class="text-center mb-4">Crie sua Conta</h2>
    <form class="w-75 mx-auto" id="formCadastro">
        <div class="row">
            <div class="col-md-12 mb-3">
                <label>Nome Completo</label>
                <input class="form-control" id="nome" placeholder="Mínimo 15 letras" type="text">
            </div>

            <div class="col-md-6 mb-3">
                <label>Telefone Celular</label>
                <input class="form-control" id="celular" placeholder="(+55)XX-XXXXXXXXX" type="text">
            </div>

            <div class="col-md-6 mb-3">
                <label>Nome de usuário</label>
                <input class="form-control" id="login" placeholder="Exatamente 6 letras" type="text">
            </div>

            <div class="col-md-6 mb-3">
                <label>Senha</label>
                <input class="form-control" id="senha" placeholder="Exatamente 8 letras" type="password">
            </div>

            <div class="col-md-6 mb-3">
                <label>Confirmar Senha</label>
                <input class="form-control" id="confirmaSenha" type="password">
            </div>
        </div>
        <div class="d-flex justify-content-center mt-2">
            <button class="btn btn-success w-50" type="submit">Cadastrar e Ir para Login</button>
        </div>
    </form>
</div>

<!-- Elemento para o Toast (Feedback sem usar alert!) -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div aria-atomic="true" aria-live="assertive" class="toast align-items-center text-bg-danger border-0" id="meuToast"
         role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMensagem">
                Mensagem de erro aqui.
            </div>
            <button aria-label="Close" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    type="button"></button>
        </div>
    </div>
</div>
<script crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
